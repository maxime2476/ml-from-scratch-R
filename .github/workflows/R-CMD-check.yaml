# Vérification du package et de la suite de tests à chaque push / PR.
# Basé sur les actions officielles r-lib (https://github.com/r-lib/actions).
name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: windows-latest, r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Le check valide la STRUCTURE : documentation, NAMESPACE, exemples,
      # métadonnées. Il n'exécute pas la suite (--no-tests) : R CMD check lance
      # tous les fichiers dans un seul processus, or les packages de référence
      # (DoubleML, grf, hdm, gmm...) y installent des méthodes S4 qui détournent
      # log/coef/mean et cassent des tests sans rapport. La suite est donc
      # exécutée à l'étape suivante, isolée par fichier.
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--no-tests")'

      # La VRAIE suite : un sous-processus R frais par fichier de test.
      # Échoue le job si un seul test échoue (run_tests.R renvoie un code != 0).
      - name: Suite de tests (isolée par fichier)
        run: Rscript run_tests.R
        shell: bash
