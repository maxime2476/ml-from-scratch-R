url: https://mgourguechon.github.io/ml-from-scratch-R

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#00798c"

home:
  title: "ML from Scratch in R"
  description: >-
    Déconstruction mathématique de 29 modules d'apprentissage et d'économétrie,
    en R base, validés contre les packages de référence et étudiés par Monte Carlo.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    articles:
      text: Livre (dérivations)
      href: https://mgourguechon.github.io/ml-from-scratch-R/book/
    github:
      icon: fab fa-github
      href: https://github.com/mgourguechon/ml-from-scratch-R

reference:
- title: "Fondations : algèbre, OLS, inférence"
  desc: "Moindres carrés, factorisations, robustesse, GLM."
  contents:
  - starts_with("solve_ls")
  - starts_with("qr_")
  - starts_with("ols_")
  - starts_with("vcov_")
  - starts_with("glm_")
  - matches("householder|chol_|svd_tools|back_substitution|forward_substitution")
  - matches("coeftest_hc|sandwich_vcov|fwl_beta2|wald_test|lr_test|score_test")

- title: "Optimisation"
  desc: "Optimiseurs génériques avec preuves de convergence (Module 0)."
  contents:
  - starts_with("optim_")

- title: "Régularisation et haute dimension"
  desc: "Ridge, lasso, lasso débiaisé, sensibilité."
  contents:
  - matches("ridge|lasso|soft_threshold|debiased|partial_r2|robustness_value|adjusted_estimate|sensitivity")

- title: "Fonctions d'influence et rééchantillonnage"
  desc: "Le fil unificateur de l'inférence (Modules 17, 24)."
  contents:
  - starts_with("influence_")
  - matches("jackknife|onestep|eif_ate|bootstrap|boot_")

- title: "Causalité"
  desc: "IV, DML, DiD moderne, arbres causaux."
  contents:
  - matches("tsls|first_stage|dml_plr|t_learner|causal_tree|predict_causal|twfe|att_gt|aggregate_att|sunab")

- title: "Non linéaire, non supervisé, réseaux"
  desc: "KNN, CART, forêts, boosting, PCA/k-means/EM, MLP, autodiff."
  contents:
  - matches("knn|cart|forest|bagging|boost|impurity|prune|kmeans|pca|em_gmm|mlp|adnode|ad_|^mm$|backward|Ops.adnode|Math.adnode|Summary.adnode|best_split|n_leaves")

- title: "Noyaux et processus gaussiens"
  contents:
  - matches("rbf_kernel|gp_|kernel_ridge|random_features|fit_rff|double_descent")

- title: "Interprétabilité et validation"
  contents:
  - matches("pdp|ice|shapley|permutation_importance|loocv|kfold|gcv|info_criteria|mallows|conformal|pinball|qreg")

- title: "Économétrie : GMM, panel, quantile"
  contents:
  - matches("gmm|fe_within|wls_fit|gls_fit")

- title: "Outils Monte Carlo et théorie de l'apprentissage"
  contents:
  - matches("mc_|coverage_mc|reject_mc|convergence_study|rmse_rate|hoeffding|rademacher|shatter|separable|concentration|edge_length|gaussian_loglik|ridge_posterior|m_estimation|ols_psi|bias_variance_mc")

- title: "Diagnostics, tests et outils d'inférence"
  desc: "Tests de spécification (Module 29), méthode delta et tests multiples (Module 34)."
  contents:
  - matches("bp_test|white_test|dw_test|bg_test|dwh_test|sargan_test|reset_test|jarque_bera|fgls|delta_method|p_adjust")

- title: "Variables dépendantes limitées"
  contents:
  - matches("^probit$|tobit_fit|heckman")

- title: "Séries temporelles"
  contents:
  - matches("acf_ts|pacf_ts|ar_yw|arma_css|ljung_box|adf_test")

- title: "Non paramétrique, RDD et MCMC"
  contents:
  - matches("^kde$|nadaraya_watson|local_linear|bw_loocv|^rdd$|metropolis_hastings|gibbs_linreg|gelman_rubin|^ess$")

- title: "Réseaux de neurones profonds"
  desc: "Optimiseurs, régularisation, CNN, RNN/LSTM, attention (Modules 35-38)."
  contents:
  - matches("optim_adam|optim_rmsprop|optim_momentum|^dropout$|batch_norm|conv2d|max_pool2d|rnn_forward|rnn_backward|lstm_forward|softmax_rows|^attention$|multi_head_attention|positional_encoding|layer_norm")

- title: "Machine learning : SVM, génératifs, clustering, réduction de dimension, RL"
  desc: "Modules 39-43."
  contents:
  - matches("svm_fit|svm_predict|svm_rbf|lda_fit|lda_predict|qda_fit|qda_predict|naive_bayes|agglomerative|dbscan_fit|spectral_clustering|kernel_pca|ica_fastica|^nmf$|^tsne$|bandit_ucb|bandit_thompson|value_iteration|q_learning")

- title: "Économétrie avancée : VAR, GARCH, survie, panel"
  desc: "Modules 44-47."
  contents:
  - matches("var_fit|granger_test|var_irf|arch_lm_test|garch_fit|kaplan_meier|logrank_test|cox_ph|synthetic_control|dynamic_panel")

- title: "Package"
  contents:
  - matches("mlfromscratch")
