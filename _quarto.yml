project:
  type: book
  output-dir: _book

book:
  title: "ML from Scratch in R"
  subtitle: "Déconstruction mathématique et statistique des modèles d'apprentissage automatique"
  author: "Maxime Gourguechon"
  date: today
  chapters:
    - index.qmd
    - rapport/memoire.qmd
    - part: "Fondations : moindres carrés et inférence"
      chapters:
        - derivations/00_linalg.qmd
        - derivations/01_ols.qmd
        - derivations/02_gls_robust.qmd
        - derivations/03_glm_irls.qmd
        - derivations/04_regularisation.qmd
        - derivations/05_iv_2sls.qmd
        - derivations/06_validation.qmd
    - part: "Théorie de l'apprentissage"
      chapters:
        - derivations/13_slt.qmd
    - part: "Modèles non linéaires"
      chapters:
        - derivations/07_knn.qmd
        - derivations/08_cart.qmd
        - derivations/09_bagging_rf.qmd
        - derivations/10_boosting.qmd
    - part: "Le regard économétrique"
      chapters:
        - derivations/14_m_estimation.qmd
    - part: "Non supervisé et réseaux"
      chapters:
        - derivations/11_pca_kmeans_em.qmd
        - derivations/12_mlp.qmd
    - part: "Post-hoc et causalité"
      chapters:
        - derivations/15_interpretabilite.qmd
        - derivations/16_causal_ml.qmd
    - part: "Extensions économétriques"
      chapters:
        - derivations/17_bootstrap.qmd
        - derivations/18_gmm.qmd
        - derivations/19_conformal.qmd
        - derivations/20_quantile.qmd
        - derivations/21_panel.qmd
    - part: "Inférence en haute dimension et causalité"
      chapters:
        - derivations/22_debiased_lasso.qmd
        - derivations/23_sensitivity.qmd
        - derivations/24_influence.qmd
        - derivations/25_did.qmd
    - part: "Frontières : sur-paramétrisation, noyaux, autodiff"
      chapters:
        - derivations/26_double_descent.qmd
        - derivations/27_gaussian_process.qmd
        - derivations/28_autodiff.qmd
    - part: "Compléments économétriques et statistiques"
      chapters:
        - derivations/29_diagnostics.qmd
        - derivations/30_limited_dependent.qmd
        - derivations/31_time_series.qmd
        - derivations/32_nonparametric.qmd
        - derivations/33_mcmc.qmd
        - derivations/34_inference_tools.qmd
    - part: "Réseaux de neurones profonds"
      chapters:
        - derivations/35_nn_training.qmd
        - derivations/36_cnn.qmd
        - derivations/37_rnn.qmd
        - derivations/38_attention.qmd
    - part: "Machine learning (compléments)"
      chapters:
        - derivations/39_svm.qmd
        - derivations/40_generative.qmd
        - derivations/41_clustering.qmd
        - derivations/42_dimreduction.qmd
        - derivations/43_bandits_rl.qmd
    - part: "Économétrie avancée"
      chapters:
        - derivations/44_var.qmd
        - derivations/45_garch.qmd
        - derivations/46_survival.qmd
        - derivations/47_panel_advanced.qmd
    - part: "Applications et études"
      chapters:
        - applications/lalonde.qmd
        - rapport/etude_double_selection.qmd
        - rapport/etude_phase_diagram.qmd
        - rapport/benchmark.qmd
    - part: "Théorie approfondie"
      chapters:
        - rapport/theory_efficiency.qmd
    - part: "Synthèse"
      chapters:
        - rapport/capstone.qmd
        - rapport/rapport.qmd
        - rapport/appendix_synthese.qmd
        - rapport/glossaire.qmd
        - rapport/bibliographie.qmd
  reader-mode: true
  repo-url: https://github.com/maxime2476/ml-from-scratch-R
  search: true

bibliography: references.bib
lang: fr

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    html-math-method: katex
  pdf:
    documentclass: scrbook
    number-sections: true
    # KaTeX connait psmallmatrix nativement ; LaTeX a besoin de mathtools.
    # newunicodechar : les glyphes unicode du texte (fleches, comparateurs) ne
    # sont pas dans Latin Modern ; sans declaration ils disparaitraient du PDF
    # en silence (simple avertissement "Missing character").
    include-in-header:
      text: |
        \usepackage{mathtools}
        \usepackage{newunicodechar}
        \newunicodechar{→}{\ensuremath{\rightarrow}}
        \newunicodechar{←}{\ensuremath{\leftarrow}}
        \newunicodechar{↔}{\ensuremath{\leftrightarrow}}
        \newunicodechar{≈}{\ensuremath{\approx}}
        \newunicodechar{≥}{\ensuremath{\geq}}
        \newunicodechar{≤}{\ensuremath{\leq}}
        \newunicodechar{≠}{\ensuremath{\neq}}
        \newunicodechar{×}{\ensuremath{\times}}
        \newunicodechar{✓}{\ensuremath{\checkmark}}
        \newunicodechar{✗}{\ensuremath{\times}}
